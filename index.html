<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>선과장 근무 스케줄</title>
<style>
  :root{
    --work:#22c55e; --work-bg:#dcfce7;
    --off:#e5e7eb;  --off-bg:#f3f4f6;
    --unset:#fde68a;
    --memo:#2563eb;
    --border:#e5e7eb; --line:#eceff2;
    --sat:#2563eb; --sun:#dc2626;
    --ink:#1f2937; --sub:#6b7280;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;
    color:var(--ink); background:#f8fafc; font-size:14px; overflow-x:hidden;
  }

  /* 상단 바 */
  .topbar{
    position:sticky; top:0; z-index:20; background:#fff;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px; padding:10px 12px; flex-wrap:wrap;
  }
  .mnav{display:flex; align-items:center; gap:4px}
  .mnav button{
    width:34px; height:34px; border:1px solid var(--border); background:#fff;
    border-radius:8px; font-size:18px; cursor:pointer; color:var(--ink); line-height:1;
  }
  .mlabel{font-size:16px; font-weight:700; min-width:96px; text-align:center}
  .btn{
    border:1px solid var(--border); background:#fff; color:var(--ink);
    padding:7px 12px; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit;
  }
  .btn.pri{background:#1e293b; color:#fff; border-color:#1e293b}
  .spacer{flex:1}
  .role{font-size:12px; color:var(--sub); white-space:nowrap}

  /* 범례 */
  .legend{
    display:flex; flex-wrap:wrap; gap:10px 14px; padding:8px 12px;
    background:#fff; border-bottom:1px solid var(--border); font-size:11px; color:var(--sub);
  }
  .legend span{display:inline-flex; align-items:center; gap:4px}
  .sw{width:14px; height:14px; border-radius:3px; display:inline-block; border:1px solid rgba(0,0,0,.08)}
  .sw.work{background:#fff}                     /* 근무=흰색(테두리로 표시) */
  .sw.off{background:#e7ebef}                    /* 휴무=옅은 회색 */
  .sw.memo{background:#fff; position:relative}
  .sw.memo::after{content:""; position:absolute; right:1px; bottom:1px; width:5px; height:5px; border-radius:50%; background:var(--memo)}

  /* 그리드 */
  .scroll{overflow:auto; -webkit-overflow-scrolling:touch; max-height:calc(100vh - 150px)}
  table{border-collapse:separate; border-spacing:0; width:max-content; margin:0 auto}  /* 좁으면 중앙, 넓으면 스크롤 */
  th,td{border-right:1px solid var(--line); border-bottom:1px solid var(--line)}

  /* 헤더(요일) */
  thead th{
    position:sticky; top:0; z-index:6; background:#f1f5f9;
    min-width:30px; width:30px; padding:3px 0; text-align:center; font-weight:600;
  }
  thead th.dnum-wrap .dnum{font-size:12px; line-height:1.1}
  thead th .dnum{font-size:12px; line-height:1.15; color:var(--ink)}
  thead th .dwd{font-size:10px; line-height:1.1; color:var(--sub)}
  thead th.sat .dwd{color:var(--sat)} thead th.sat .dnum{color:var(--sat)}
  thead th.sun .dwd{color:var(--sun)} thead th.sun .dnum{color:var(--sun)}
  thead th.today{background:#f3f4f6; box-shadow:inset 0 -2px 0 #cbd5e1}
  thead th.today .dnum{font-weight:700}

  /* 이름 열(좌측 고정) */
  th.corner{
    position:sticky; left:0; top:0; z-index:8; background:#eef2f7;
    min-width:64px; width:64px; text-align:center; font-size:12px; color:var(--sub);
  }
  td.name{
    position:sticky; left:0; z-index:5; background:#fff;
    min-width:64px; width:64px; padding:0 8px; font-size:12px; font-weight:600;
    white-space:nowrap; height:30px;
  }

  /* 데이터 셀 */
  td.cell{
    width:30px; min-width:30px; height:30px; padding:0; text-align:center; position:relative;
    background:#fff;
  }
  td.cell.work{background:#fff}                 /* 근무=흰색(표시 안 함) */
  td.cell.unset{background:#fff}                /* 미설정=근무와 동일(흰색) */
  td.cell.off{background:#e7ebef}               /* 휴무만 옅은 회색 */
  /* 예외(exc)·오늘열(tcol) 시각 강조 없음 — 근무 흰색/휴무 회색 결과만 표시 */
  td.cell.selecting{background:#dbeafe; box-shadow:inset 0 0 0 2px #2563eb}   /* 드래그 선택 */
  td.cell .memo{position:absolute; right:2px; bottom:2px; width:6px; height:6px; border-radius:50%; background:var(--memo)}
  body.admin #grid{-webkit-user-select:none; user-select:none}   /* 드래그 중 텍스트선택 방지 */

  /* 일괄 액션바 */
  .bulk-bar{position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:45;
    background:#fff; border:1px solid var(--border); border-radius:12px;
    box-shadow:0 6px 24px rgba(0,0,0,.18); padding:10px 12px; display:flex; align-items:center; gap:8px}
  .bulk-bar #bulk-count{font-size:13px; font-weight:700; margin-right:2px; white-space:nowrap}
  .bulk-bar button{padding:9px 15px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid var(--border); font-family:inherit}
  .bulk-bar .b-work{background:var(--work-bg); border-color:var(--work); color:#166534}
  .bulk-bar .b-off{background:#e5e7eb; border-color:#9ca3af; color:#374151}
  .bulk-bar .b-cancel{background:#fff; color:var(--sub)}
  .bulk-bar button:disabled{opacity:.6}

  /* 집계(하단 고정) */
  tfoot td{
    position:sticky; bottom:0; z-index:6; background:#f8fafc; text-align:center;
    font-size:12px; font-weight:700; height:26px; color:var(--ink);
  }
  tfoot td.name{z-index:9; background:#eef2f7; color:var(--sub); font-weight:600}
  tfoot tr.off-row td{color:var(--sub); font-weight:600}
  tfoot td.tcol{background:#f3f4f6}

  /* 메모 팝업 */
  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; z-index:40}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41; background:#fff;
    border-radius:16px 16px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .2s; max-width:560px; margin:0 auto;
  }
  .sheet.open{transform:translateY(0)}
  .sheet h3{margin:0 0 8px; font-size:15px}
  .sheet .memo-date{font-size:12px; color:var(--sub); margin-bottom:6px}
  .sheet .memo-text{font-size:14px; line-height:1.5; white-space:pre-wrap; word-break:break-word}
  .sheet .close{margin-top:14px; width:100%; padding:11px; border:0; border-radius:10px; background:#1e293b; color:#fff; font-size:14px; cursor:pointer}

  .msg{padding:24px 16px; text-align:center; color:var(--sub); font-size:13px}
  .err{color:#dc2626}

  /* 관리자 모드 셀 커서 */
  body.admin td.cell{cursor:pointer}

  /* 시트 공통 입력 요소 */
  .lbl{display:block; font-size:12px; color:var(--sub); margin:10px 0 4px}
  .sheet input, .sheet textarea{
    width:100%; padding:11px; border:1px solid var(--border); border-radius:9px;
    font-size:15px; font-family:inherit; box-sizing:border-box; background:#fff; color:var(--ink);
  }
  .sheet textarea{resize:vertical}
  .hint{font-size:12px; color:var(--sub); margin:4px 0 2px}
  .hint.err{color:#dc2626}
  .keep{display:flex; align-items:center; gap:7px; margin-top:12px; font-size:14px; color:var(--ink); cursor:pointer}
  .keep input{width:18px; height:18px}
  .seg{display:flex; gap:8px; margin:6px 0 2px}
  .seg button{
    flex:1; padding:13px; border:1.5px solid var(--border); background:#fff; border-radius:11px;
    font-size:15px; font-weight:700; cursor:pointer; color:var(--sub); font-family:inherit;
  }
  .seg button.sel[data-v="work"]{background:var(--work-bg); border-color:var(--work); color:#166534}
  .seg button.sel[data-v="off"]{background:#e5e7eb; border-color:#9ca3af; color:#374151}
  .row2{display:flex; gap:8px; margin-top:16px}
  .btn2{flex:1; padding:12px; border-radius:10px; font-size:15px; cursor:pointer; border:1px solid var(--border); font-family:inherit}
  .btn2.ghost{background:#fff; color:var(--ink)}
  .btn2.pri{background:#1e293b; color:#fff; border-color:#1e293b}
  .btn2:disabled{opacity:.6}

  /* 전체화면 모달 (직원 관리 / 패턴 편집) */
  .modal{position:fixed; inset:0; z-index:50; background:#f8fafc; display:none; flex-direction:column}
  .modal.open{display:flex}
  .modal-hd{flex:0 0 auto; background:#fff; border-bottom:1px solid var(--border); padding:12px 14px; display:flex; align-items:center; justify-content:space-between}
  .modal-hd h3{margin:0; font-size:16px}
  .modal-hd .x{border:0; background:none; font-size:20px; cursor:pointer; color:var(--sub); padding:4px 8px; line-height:1}
  .modal-bd{flex:1 1 auto; overflow:auto; padding:14px; -webkit-overflow-scrolling:touch; max-width:640px; width:100%; margin:0 auto}
  .modal-ft{flex:0 0 auto; border-top:1px solid var(--border); background:#fff; padding:10px 14px; display:flex; gap:8px; max-width:640px; width:100%; margin:0 auto; box-sizing:border-box}
  .note{font-size:12px; color:var(--sub); margin:12px 2px 0; line-height:1.5}

  /* 직원 관리 */
  .emp-add{display:flex; gap:8px; margin-bottom:12px}
  .emp-add input{flex:1; padding:11px; border:1px solid var(--border); border-radius:9px; font-size:15px; font-family:inherit; box-sizing:border-box}
  .emp-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line)}
  .emp-row.inactive{opacity:.5}
  .emp-row .ord{display:flex; flex-direction:column; gap:3px}
  .emp-row .ord button{width:30px; height:20px; border:1px solid var(--border); background:#fff; border-radius:5px; font-size:10px; cursor:pointer; line-height:1; padding:0}
  .emp-row .ord button:disabled{opacity:.3}
  .emp-row .emp-name{flex:1; padding:9px; border:1px solid var(--border); border-radius:8px; font-size:15px; font-family:inherit; box-sizing:border-box; min-width:0}
  .emp-row .act{flex:0 0 auto}

  /* 패턴 편집 */
  .pat-row{display:flex; align-items:center; border-bottom:1px solid var(--line)}
  .pat-row.pat-head{border-bottom:2px solid var(--border); position:sticky; top:-14px; background:#f8fafc; z-index:1}
  .pat-row .pn{flex:1; min-width:56px; font-size:13px; font-weight:600; padding:9px 4px}
  .pat-row.pat-head .pn{font-weight:400; color:var(--sub)}
  .pat-row .pc{width:36px; text-align:center; padding:9px 0; font-size:12px; color:var(--sub)}
  .pat-row .pc input{width:20px; height:20px}

  /* 전체 중앙 정렬 (표와 같은 축의 가운데 기둥) */
  .topbar, .legend, #schedule-view .subbar, .scroll{max-width:1040px; margin-left:auto; margin-right:auto}
  #leave-view .subbar{max-width:640px; margin-left:auto; margin-right:auto}  /* 대체휴무 본문(640)과 동일 축 */

  /* 탭 */
  .tabs{display:flex; gap:4px}
  .tab{padding:7px 14px; border:1px solid var(--border); background:#fff; border-radius:8px; font-size:14px; font-weight:700; color:var(--sub); cursor:pointer; font-family:inherit}
  .tab.active{background:#1e293b; color:#fff; border-color:#1e293b}

  /* 하위 컨트롤 바 (스케줄/대체휴무 공통) */
  .subbar{display:flex; align-items:center; gap:8px; padding:8px 12px; background:#fff; border-bottom:1px solid var(--border); flex-wrap:wrap}
  .subbar .mlabel{font-size:15px}
  .lv-title{font-size:15px; font-weight:700}

  /* 지급/사용 세그 (편집 세그 재사용 + 색상) */
  .seg button.sel[data-v="grant"]{background:var(--work-bg); border-color:var(--work); color:#166534}
  .seg button.sel[data-v="use"]{background:#fee2e2; border-color:#f87171; color:#b91c1c}

  /* 대체휴무 장부 */
  #leave-body{max-width:640px; margin:0 auto; padding:12px}
  .lv-hd, .lv-row{display:grid; grid-template-columns:1fr 58px 58px 64px; align-items:center}
  .lv-hd{font-size:12px; color:var(--sub); padding:6px 8px; border-bottom:2px solid var(--border)}
  .lv-hd .lv-c{text-align:right}
  .lv-row{padding:11px 8px; border-bottom:1px solid var(--line); cursor:pointer; font-size:14px}
  .lv-nm{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .lv-c{text-align:right; font-variant-numeric:tabular-nums; font-size:13px}
  .lv-c.grant{color:#16a34a} .lv-c.use{color:#dc2626}
  .lv-c.bal{font-weight:700; color:var(--ink)} .lv-c.bal.neg{color:#dc2626}
  .lv-detail{background:#fafbfc; border-bottom:1px solid var(--line); padding:2px 8px 6px}
  .lv-empty{font-size:12px; color:var(--sub); padding:8px 4px}
  .lv-line{display:flex; align-items:center; gap:8px; padding:8px 4px; border-bottom:1px solid var(--line)}
  .lv-line:last-child{border-bottom:0}
  .lb{font-size:11px; font-weight:700; padding:2px 7px; border-radius:8px; flex:0 0 auto}
  .lb.grant{background:var(--work-bg); color:#166534}
  .lb.use{background:#fee2e2; color:#b91c1c}
  .lv-meta{flex:1; min-width:0}
  .lv-cat{font-size:13px; word-break:break-word}
  .lv-date{font-size:11px; color:var(--sub)}
  .lv-days{font-weight:700; font-variant-numeric:tabular-nums; flex:0 0 auto}
  .lv-days.grant{color:#16a34a} .lv-days.use{color:#dc2626}
  .lv-del{border:1px solid #fecaca; background:#fff; color:#dc2626; border-radius:6px; font-size:11px; padding:5px 8px; cursor:pointer; flex:0 0 auto; font-family:inherit}
  #lv-emp, #lv-cat{width:100%}
</style>
</head>
<body>

<div class="topbar">
  <div class="tabs">
    <button class="tab active" id="tab-sched">스케줄</button>
    <button class="tab" id="tab-leave">대체휴무</button>
  </div>
  <div class="spacer"></div>
  <span class="role" id="role">읽기 전용</span>
  <button class="btn" id="admin-btn">관리자</button>
</div>

<!-- 스케줄 화면 -->
<div id="schedule-view">
  <div class="subbar">
    <div class="mnav">
      <button id="prev" aria-label="이전 달">‹</button>
      <div class="mlabel" id="mlabel">—</div>
      <button id="next" aria-label="다음 달">›</button>
    </div>
    <button class="btn" id="today-btn">오늘</button>
    <button class="btn adm-only" id="emp-btn" style="display:none">직원</button>
    <button class="btn adm-only" id="pat-btn" style="display:none">패턴</button>
  </div>

  <div class="legend">
    <span><i class="sw work"></i>근무</span>
    <span><i class="sw off"></i>휴무</span>
    <span><i class="sw memo"></i>메모</span>
  </div>

  <div class="scroll" id="scroll">
    <div class="msg" id="grid-msg">불러오는 중…</div>
    <div id="grid"></div>
  </div>
</div>

<!-- 대체휴무 화면 -->
<div id="leave-view" style="display:none">
  <div class="subbar">
    <div class="lv-title">대체휴무 장부</div>
    <div class="spacer"></div>
    <button class="btn adm-only" id="leave-add-btn" style="display:none">+ 기록 추가</button>
  </div>
  <div id="leave-body">
    <div class="msg" id="leave-msg">불러오는 중…</div>
    <div id="leave-summary"></div>
  </div>
</div>

<!-- 공통 배경 -->
<div class="sheet-bg" id="sheet-bg"></div>

<!-- 메모 보기 -->
<div class="sheet" id="view-sheet">
  <h3 id="view-title">메모</h3>
  <div class="memo-date" id="view-date"></div>
  <div class="memo-text" id="view-text"></div>
  <button class="close" id="view-close">닫기</button>
</div>

<!-- 관리자: 근무 편집 -->
<div class="sheet" id="edit-sheet">
  <h3 id="edit-title">근무 수정</h3>
  <div class="memo-date" id="edit-date"></div>
  <div class="seg">
    <button id="seg-work" data-v="work">근무</button>
    <button id="seg-off" data-v="off">휴무</button>
  </div>
  <div class="hint" id="edit-hint"></div>
  <label class="lbl">메모 (선택)</label>
  <textarea id="edit-memo" rows="2" placeholder="예) 병가, 휴무 요청"></textarea>
  <div class="row2">
    <button class="btn2 ghost" id="edit-cancel">닫기</button>
    <button class="btn2 pri" id="edit-save">저장</button>
  </div>
</div>

<!-- 관리자 PIN -->
<div class="sheet" id="login-sheet">
  <h3>관리자 PIN</h3>
  <label class="lbl">PIN (4자리)</label>
  <input id="login-pin" type="password" inputmode="numeric" autocomplete="off" maxlength="4" pattern="[0-9]*" placeholder="••••">
  <label class="keep"><input type="checkbox" id="login-keep"> 로그인 유지</label>
  <div class="hint err" id="login-err" style="display:none"></div>
  <div class="row2">
    <button class="btn2 ghost" id="login-cancel">취소</button>
    <button class="btn2 pri" id="login-do">로그인</button>
  </div>
</div>

<!-- 대체휴무 기록 추가 -->
<div class="sheet" id="leave-sheet">
  <h3>대체휴무 기록 추가</h3>
  <label class="lbl">직원</label>
  <select id="lv-emp"></select>
  <div class="seg" style="margin-top:6px">
    <button id="lv-grant" data-v="grant">지급</button>
    <button id="lv-use" data-v="use">사용</button>
  </div>
  <label class="lbl">구분</label>
  <select id="lv-cat">
    <option>대체근무</option>
    <option>대체휴무</option>
    <option>경조사</option>
    <option>예비군</option>
  </select>
  <label class="lbl">사유 (선택)</label>
  <input id="lv-reason" type="text" placeholder="예) 토요일 당번">
  <label class="lbl">일자</label>
  <input id="lv-date" type="date">
  <label class="lbl">일수</label>
  <input id="lv-days" type="number" min="0.5" step="0.5" value="1" inputmode="decimal">
  <div class="row2">
    <button class="btn2 ghost" id="lv-cancel">취소</button>
    <button class="btn2 pri" id="lv-save">저장</button>
  </div>
</div>

<!-- 직원 관리 모달 -->
<div class="modal" id="emp-modal">
  <div class="modal-hd"><h3>직원 관리</h3><button class="x" id="emp-close">✕</button></div>
  <div class="modal-bd">
    <div class="emp-add">
      <input id="emp-new" placeholder="새 직원 이름">
      <button class="btn2 pri" id="emp-add" style="flex:0 0 auto">추가</button>
    </div>
    <div id="emp-list"></div>
    <p class="note">순서 ▲▼ · 이름은 수정 후 다른 곳을 탭하면 저장 · 삭제 대신 재직 토글(비활성)</p>
  </div>
  <div class="modal-ft"><button class="btn2 ghost" id="emp-done">닫기</button></div>
</div>

<!-- 패턴 편집 모달 -->
<div class="modal" id="pat-modal">
  <div class="modal-hd"><h3 id="pat-title">휴무 패턴</h3><button class="x" id="pat-close">✕</button></div>
  <div class="modal-bd">
    <button class="btn2 ghost" id="pat-copy" style="display:none;width:100%;margin-bottom:12px">⬇ 전월 패턴 복사</button>
    <div id="pat-list"></div>
    <p class="note">체크 = 그 요일 휴무. 저장하면 이 달 모든 재직 직원의 휴무 패턴이 설정됩니다.</p>
  </div>
  <div class="modal-ft">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

/* ── Supabase ── */
const SUPABASE_URL = "https://nwokdlcdiphltgmtysim.supabase.co";
const SUPABASE_KEY = "sb_publishable_erFCG-fmkg6t0k3GB6M0nA_0djQcjC5";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── 날짜 헬퍼 (전부 로컬 기준 — UTC 밀림 방지) ── */
const WD = ["일","월","화","수","목","금","토"];
const pad2 = n => String(n).padStart(2, "0");
const ymStr = (y,m) => `${y}-${pad2(m)}`;
const dateStr = (y,m,d) => `${y}-${pad2(m)}-${pad2(d)}`;
const daysInMonth = (y,m) => new Date(y, m, 0).getDate();      // m=1..12
const weekday = (y,m,d) => new Date(y, m-1, d).getDay();       // 0=일 ~ 6=토

const _now = new Date();
const today = { y:_now.getFullYear(), m:_now.getMonth()+1, d:_now.getDate() };

/* ── 상태 ── */
const state = {
  y: today.y, m: today.m,
  tab: "schedule",   // 'schedule' | 'leave'
  isAdmin: false,
  allEmployees: [],  // 전체(비활성 포함) — 직원 관리 모달용
  employees: [],     // 재직만 — 그리드용
  patterns: {},   // employee_id -> pattern row
  overrides: {},  // "employee_id|YYYY-MM-DD" -> override row
  ledger: [],     // 대체휴무 장부 전체 행
  leaveExpanded: new Set(),  // 펼친 직원 id
};

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ── 데이터 로드 ── */
async function loadMonth(y, m) {
  const ym = ymStr(y,m);
  const first = dateStr(y,m,1);
  const last  = dateStr(y,m,daysInMonth(y,m));
  const [emp, pat, ovr] = await Promise.all([
    sb.from("employees").select("*").order("display_order"),
    sb.from("monthly_patterns").select("*").eq("month", ym),
    sb.from("schedule_overrides").select("*").gte("date", first).lte("date", last),
  ]);
  if (emp.error) throw emp.error;
  if (pat.error) throw pat.error;
  if (ovr.error) throw ovr.error;

  state.allEmployees = emp.data || [];
  state.employees = state.allEmployees.filter(e => e.active);
  state.patterns = {};
  (pat.data || []).forEach(p => { state.patterns[p.employee_id] = p; });
  state.overrides = {};
  (ovr.data || []).forEach(o => { state.overrides[o.employee_id + "|" + o.date] = o; });
}

/* ── 셀 상태 계산 ──
   1) override 있으면 그 status가 최종
   2) 없으면 그 달 패턴 off_weekdays 포함 시 휴무, 아니면 근무
   3) 패턴 행 없으면 '미설정' = 근무로 간주 */
function cellStatus(emp, y, m, d) {
  const ds = dateStr(y,m,d);
  const pat = state.patterns[emp.id];
  const patternSet = !!pat;
  const patternStatus = patternSet
    ? (pat.off_weekdays.includes(weekday(y,m,d)) ? "off" : "work")
    : "work";
  const ov = state.overrides[emp.id + "|" + ds];
  if (ov) {
    return { status: ov.status, isException: ov.status !== patternStatus, memo: ov.memo || "", patternSet };
  }
  return { status: patternStatus, isException: false, memo: "", patternSet };
}

const isToday = (y,m,d) => y===today.y && m===today.m && d===today.d;

/* ── 렌더 ── */
function render() {
  const y = state.y, m = state.m, dim = daysInMonth(y,m);
  document.getElementById("mlabel").textContent = `${y}년 ${m}월`;

  if (!state.employees.length) {
    document.getElementById("grid").innerHTML = "";
    const msg = document.getElementById("grid-msg");
    msg.textContent = "재직 중인 직원이 없습니다.";
    msg.style.display = "";
    return;
  }
  document.getElementById("grid-msg").style.display = "none";

  // 헤더
  let thead = `<tr><th class="corner">직원</th>`;
  for (let d=1; d<=dim; d++){
    const wd = weekday(y,m,d);
    const cls = (wd===0?"sun":wd===6?"sat":"") + (isToday(y,m,d)?" today":"");
    thead += `<th class="${cls}"><div class="dnum">${d}</div><div class="dwd">${WD[wd]}</div></th>`;
  }
  thead += `</tr>`;

  // 본문
  let tbody = "";
  for (const emp of state.employees){
    let row = `<tr><td class="name">${esc(emp.name)}</td>`;
    for (let d=1; d<=dim; d++){
      const cs = cellStatus(emp,y,m,d);
      let cls = "cell " + (cs.status==="off" ? "off" : (cs.patternSet ? "work" : "unset"));
      if (cs.isException) cls += " exc";
      if (isToday(y,m,d)) cls += " tcol";
      const attrs = ` data-eid="${emp.id}" data-name="${esc(emp.name)}" data-date="${dateStr(y,m,d)}"`
        + (cs.memo ? ` data-memo="${esc(cs.memo)}"` : "");
      const dot = cs.memo ? `<span class="memo"></span>` : "";
      row += `<td class="${cls}"${attrs}>${dot}</td>`;
    }
    tbody += row + `</tr>`;
  }

  // 집계 (근무/휴무) — 미설정도 근무로 카운트되어 근무+휴무 = 재직 인원
  let workRow = `<tr class="work-row"><td class="name">근무</td>`;
  let offRow  = `<tr class="off-row"><td class="name">휴무</td>`;
  for (let d=1; d<=dim; d++){
    let w=0, o=0;
    for (const emp of state.employees){
      (cellStatus(emp,y,m,d).status==="off") ? o++ : w++;
    }
    const t = isToday(y,m,d) ? " tcol" : "";
    workRow += `<td class="${t}">${w}</td>`;
    offRow  += `<td class="${t}">${o}</td>`;
  }
  workRow += `</tr>`; offRow += `</tr>`;

  document.getElementById("grid").innerHTML =
    `<table><thead>${thead}</thead><tbody>${tbody}</tbody><tfoot>${workRow}${offRow}</tfoot></table>`;
}

/* ── 월 이동 ── */
async function goMonth(y, m) {
  state.y = y; state.m = m;
  const msg = document.getElementById("grid-msg");
  msg.textContent = "불러오는 중…"; msg.className = "msg"; msg.style.display = "";
  document.getElementById("grid").innerHTML = "";
  try {
    await loadMonth(y, m);
    render();
  } catch (e) {
    document.getElementById("grid").innerHTML = "";
    msg.className = "msg err";
    msg.textContent = "불러오기 실패: " + (e.message || e);
    msg.style.display = "";
    console.error(e);
  }
}
function step(delta) {
  let y = state.y, m = state.m + delta;
  if (m < 1) { m = 12; y--; } else if (m > 12) { m = 1; y++; }
  goMonth(y, m);
}

/* ── 시트(공통) ── */
const backdrop = () => document.getElementById("sheet-bg");
function openSheetEl(id) {
  backdrop().style.display = "block";
  const el = document.getElementById(id);
  requestAnimationFrame(() => el.classList.add("open"));
}
function closeSheets() {
  document.querySelectorAll(".sheet.open").forEach(el => el.classList.remove("open"));
  setTimeout(() => { backdrop().style.display = "none"; }, 180);
}

/* 메모 보기 (비관리자/메모 셀) */
function openViewSheet(name, date, memo) {

/* ── 관리자: 근무 편집 ── */
let editCtx = null;
function openEditSheet(eid, date, name) {
  const [y,m,d] = date.split("-").map(Number);
  const emp = state.employees.find(e => String(e.id) === String(eid));
  if (!emp) return;
  const pat = state.patterns[eid];
  const patternSet = !!pat;
  const patternStatus = patternSet ? (pat.off_weekdays.includes(weekday(y,m,d)) ? "off" : "work") : "work";
  const cs = cellStatus(emp, y, m, d);
  editCtx = { eid, date, patternStatus, selStatus: cs.status };
  document.getElementById("edit-title").textContent = name;
  document.getElementById("edit-date").textContent = `${date} (${WD[weekday(y,m,d)]})`;
  document.getElementById("edit-memo").value = cs.memo || "";
  document.getElementById("edit-hint").textContent =
    `패턴 기본: ${patternStatus === "off" ? "휴무" : "근무"}${patternSet ? "" : " (미설정)"}`;
  setSeg(cs.status);
  openSheetEl("edit-sheet");
}
function setSeg(v) {
  if (editCtx) editCtx.selStatus = v;
  document.getElementById("seg-work").classList.toggle("sel", v === "work");
  document.getElementById("seg-off").classList.toggle("sel", v === "off");
}
// 그날 패턴 상태(근무/휴무)
function patternStatusOf(eid, y, m, d) {
  const pat = state.patterns[eid];
  return pat ? (pat.off_weekdays.includes(weekday(y, m, d)) ? "off" : "work") : "work";
}
// override 커밋(단일·일괄 공용): 패턴과 같고 메모 없으면 삭제, 아니면 upsert. 로컬 state.overrides 갱신.
async function commitOverride(eid, date, status, memo) {
  const [y, m, d] = date.split("-").map(Number);
  const patternStatus = patternStatusOf(eid, y, m, d);
  memo = (memo || "").trim();
  if (status === patternStatus && !memo) {
    const { error } = await sb.from("schedule_overrides").delete()
      .eq("employee_id", eid).eq("date", date);
    if (error) throw error;
    delete state.overrides[eid + "|" + date];
  } else {
    const { data, error } = await sb.from("schedule_overrides")
      .upsert({ employee_id: eid, date, status, memo: memo || null }, { onConflict: "employee_id,date" })
      .select().single();
    if (error) throw error;
    state.overrides[eid + "|" + date] = data;
  }
}

async function saveEdit() {
  if (!editCtx) return;
  const { eid, date, selStatus } = editCtx;
  const memo = document.getElementById("edit-memo").value.trim();
  const btn = document.getElementById("edit-save");
  btn.disabled = true; btn.textContent = "저장 중…";
  try {
    await commitOverride(eid, date, selStatus, memo);
    closeSheets();
    render();
  } catch (e) {
    alert("저장 실패: " + (e.message || e));
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = "저장";
  }
}

/* ── 드래그 다중 선택(관리자·마우스): 같은 직원 행에서 가로 범위 → 일괄 근무/휴무 ── */
let _drag = false, _dragEid = null, _dragStartDay = 0, _selDates = [], _dragConsumed = false, _bulkPending = null;
const dayOf = ds => Number(ds.slice(8, 10));

function paintRange(day1, day2) {
  const g = document.getElementById("grid");
  const lo = Math.min(day1, day2), hi = Math.max(day1, day2);
  _selDates = [];
  for (let d = lo; d <= hi; d++) _selDates.push(dateStr(state.y, state.m, d));
  g.querySelectorAll("td.cell.selecting").forEach(c => c.classList.remove("selecting"));
  for (const ds of _selDates) {
    const c = g.querySelector(`td.cell[data-eid="${_dragEid}"][data-date="${ds}"]`);
    if (c) c.classList.add("selecting");
  }
}
function clearSelection() {
  document.getElementById("grid").querySelectorAll("td.cell.selecting").forEach(c => c.classList.remove("selecting"));
  _selDates = [];
}
function showBulk(eid, dates) {
  _bulkPending = { eid, dates };
  document.getElementById("bulk-count").textContent = `선택 ${dates.length}칸`;
  document.getElementById("bulk-bar").style.display = "flex";
}
function hideBulk() {
  _bulkPending = null;
  document.getElementById("bulk-bar").style.display = "none";
  clearSelection();
}
async function bulkApply(status) {
  if (!_bulkPending) return;
  const { eid, dates } = _bulkPending;
  const btns = document.getElementById("bulk-bar").querySelectorAll("button");
  btns.forEach(b => b.disabled = true);
  try {
    await Promise.all(dates.map(d => {
      const ov = state.overrides[eid + "|" + d];
      return commitOverride(eid, d, status, ov ? ov.memo : "");
    }));
    hideBulk();
    render();
  } catch (e) {
    alert("일괄 저장 실패: " + (e.message || e));
    console.error(e);
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

/* ── 인증 (4자리 PIN — app_settings.admin_pin, 매 로그인 시 조회) ── */
function openLoginSheet() {
  document.getElementById("login-err").style.display = "none";
  document.getElementById("login-pin").value = "";
  document.getElementById("login-keep").checked = false;
  openSheetEl("login-sheet");
}
async function doLogin() {
  const pinEl = document.getElementById("login-pin");
  const pin = pinEl.value.trim();
  const keep = document.getElementById("login-keep").checked;
  const errEl = document.getElementById("login-err");
  const btn = document.getElementById("login-do");
  if (!pin) { errEl.textContent = "PIN을 입력하세요."; errEl.style.display = ""; return; }
  errEl.style.display = "none";
  btn.disabled = true; btn.textContent = "확인 중…";
  try {
    const { data, error } = await sb.from("app_settings")
      .select("value").eq("key", "admin_pin").single();
    if (error) throw error;
    if (!data || String(data.value) !== pin) {
      errEl.textContent = "PIN이 올바르지 않습니다.";
      errEl.style.display = "";
      pinEl.value = "";
      return;
    }
    // 성공: 관리자 진입
    state.isAdmin = true;
    sessionStorage.setItem("sched_admin", "1");
    if (keep) localStorage.setItem("sched_admin_keep", "1");
    pinEl.value = "";
    closeSheets();
    updateAuthUI();
    if (state.tab === "leave") renderLeave(); else render();
  } catch (e) {
    errEl.textContent = "확인 실패: " + (e.message || e);
    errEl.style.display = "";
  } finally {
    btn.disabled = false; btn.textContent = "로그인";
  }
}
function doLogout() {
  state.isAdmin = false;
  sessionStorage.removeItem("sched_admin");
  localStorage.removeItem("sched_admin_keep");
  hideBulk();   // 드래그 일괄바 열려있으면 정리
  updateAuthUI();
  if (state.tab === "leave") renderLeave(); else render();
}

function updateAuthUI() {
  const btn = document.getElementById("admin-btn");
  const role = document.getElementById("role");
  if (state.isAdmin) {
    role.textContent = "관리자";
    btn.textContent = "로그아웃";
    btn.onclick = doLogout;
    document.body.classList.add("admin");
  } else {
    role.textContent = "읽기 전용";
    btn.textContent = "관리자";
    btn.onclick = openLoginSheet;
    document.body.classList.remove("admin");
  }
  document.querySelectorAll(".adm-only").forEach(el => {
    el.style.display = state.isAdmin ? "" : "none";
  });
}

/* ── 직원 관리 ── */
async function loadAllEmployees() {
  const { data, error } = await sb.from("employees").select("*").order("display_order");
  if (error) throw error;
  state.allEmployees = data || [];
  state.employees = state.allEmployees.filter(e => e.active);
}
function openEmpModal() { renderEmpList(); document.getElementById("emp-modal").classList.add("open"); }
function renderEmpList() {
  const list = state.allEmployees;
  document.getElementById("emp-list").innerHTML = list.map((e, i) => `
    <div class="emp-row${e.active ? "" : " inactive"}">
      <div class="ord">
        <button data-act="up" data-id="${e.id}" ${i === 0 ? "disabled" : ""}>▲</button>

      </div>

    </div>`).join("");
}
async function empRefresh() { await loadAllEmployees(); renderEmpList(); render(); }
async function empAdd() {
  const el = document.getElementById("emp-new");
  const name = el.value.trim();
  if (!name) return;
  const maxOrder = state.allEmployees.reduce((m, e) => Math.max(m, e.display_order || 0), 0);

    const { error } = await sb.from("employees").insert({ name, display_order: maxOrder + 1, active: true });

    el.value = "";

}
async function empRename(id, name) {
  name = name.trim();
  if (!name) { renderEmpList(); return; }
  const cur = state.allEmployees.find(e => String(e.id) === String(id));
  if (cur && cur.name === name) return;
  try {
    const { error } = await sb.from("employees").update({ name }).eq("id", id);
    if (error) throw error;
    await empRefresh();
  } catch (e) { alert("이름 수정 실패: " + (e.message || e)); }
}
async function empToggle(id) {
  const e = state.allEmployees.find(x => String(x.id) === String(id));
  if (!e) return;
  try {
    const { error } = await sb.from("employees").update({ active: !e.active }).eq("id", id);
    if (error) throw error;
    await empRefresh();
  } catch (err) { alert("변경 실패: " + (err.message || err)); }
}
async function empMove(id, dir) {
  const list = state.allEmployees;
  const i = list.findIndex(e => String(e.id) === String(id));
  const j = dir === "up" ? i - 1 : i + 1;
  if (i < 0 || j < 0 || j >= list.length) return;
  const a = list[i], b = list[j];
  try {
    const [r1, r2] = await Promise.all([
      sb.from("employees").update({ display_order: b.display_order }).eq("id", a.id),
      sb.from("employees").update({ display_order: a.display_order }).eq("id", b.id),
    ]);
    if (r1.error) throw r1.error; if (r2.error) throw r2.error;
    await empRefresh();
  } catch (e) { alert("순서 변경 실패: " + (e.message || e)); }
}

/* ── 패턴 편집 ── */
const PAT_WD = [[1,"월"],[2,"화"],[3,"수"],[4,"목"],[5,"금"],[6,"토"],[0,"일"]];

async function patCopyPrev() {

  document.getElementById("pat-copy").style.display = "none";
}
async function savePat() {
  const emps = state.employees;
  const map = {};
  emps.forEach(e => { map[e.id] = []; });
  document.querySelectorAll('#pat-list input[type="checkbox"]:checked').forEach(cb => {
    if (map[cb.dataset.eid]) map[cb.dataset.eid].push(Number(cb.dataset.wd));
  });
  const rows = emps.map(e => ({
    employee_id: e.id, month: ymStr(state.y, state.m),
    off_weekdays: map[e.id].sort((a, b) => a - b),
  }));
  const btn = document.getElementById("pat-save");
  btn.disabled = true; btn.textContent = "저장 중…";
  try {
    const { error } = await sb.from("monthly_patterns").upsert(rows, { onConflict: "employee_id,month" });
    if (error) throw error;
    document.getElementById("pat-modal").classList.remove("open");
    await goMonth(state.y, state.m);
  } catch (e) {
    alert("저장 실패: " + (e.message || e));
  } finally {
    btn.disabled = false; btn.textContent = "저장";
  }
}

/* ── 탭 전환 ── */
function setTab(tab) {
  state.tab = tab;
  document.getElementById("schedule-view").style.display = tab === "schedule" ? "" : "none";
  document.getElementById("leave-view").style.display = tab === "leave" ? "" : "none";
  document.getElementById("tab-sched").classList.toggle("active", tab === "schedule");
  document.getElementById("tab-leave").classList.toggle("active", tab === "leave");
  if (tab === "leave") loadAndRenderLeave();
}

/* ── 대체휴무 장부 ── */
const LEAVE_CATS = ["대체근무", "대체휴무", "경조사", "예비군"];
let leaveDir = "grant";   // 입력 시트 지급/사용 선택

const fmtDays = n => { n = Number(n) || 0; return Number.isInteger(n) ? String(n) : n.toFixed(1); };

async function loadLeave() {
  const { data, error } = await sb.from("leave_ledger")
    .select("*").order("date", { ascending: false }).order("id", { ascending: false });
  if (error) throw error;
  state.ledger = data || [];
}

async function loadAndRenderLeave() {
  const msg = document.getElementById("leave-msg");
  msg.className = "msg"; msg.textContent = "불러오는 중…"; msg.style.display = "";
  try {
    if (!state.allEmployees.length) await loadAllEmployees();
    await loadLeave();
    msg.style.display = "none";
    renderLeave();
  } catch (e) {
    msg.className = "msg err"; msg.textContent = "불러오기 실패: " + (e.message || e); msg.style.display = "";
    console.error(e);
  }
}

function leaveTotals() {
  const t = {};
  for (const r of state.ledger) {
    if (!t[r.employee_id]) t[r.employee_id] = { grant: 0, use: 0 };
    const d = Number(r.days) || 0;
    if (r.direction === "grant") t[r.employee_id].grant += d; else t[r.employee_id].use += d;
  }
  return t;
}

function ledgerLine(r) {
  const isGrant = r.direction === "grant";
  const badge = isGrant ? `<span class="lb grant">지급</span>` : `<span class="lb use">사용</span>`;
  const meta = (r.category ? esc(r.category) : "-") + (r.reason ? ` · ${esc(r.reason)}` : "");
  const del = state.isAdmin ? `<button class="lv-del" data-id="${r.id}">삭제</button>` : "";
  return `<div class="lv-line">
    ${badge}
    <div class="lv-meta"><div class="lv-cat">${meta}</div><div class="lv-date">${r.date}</div></div>
    <div class="lv-days ${isGrant ? "grant" : "use"}">${isGrant ? "+" : "−"}${fmtDays(r.days)}</div>
    ${del}
  </div>`;
}

function renderLeave() {
  const totals = leaveTotals();
  const emps = state.employees;   // 재직, display_order
  let html = `<div class="lv-hd"><div class="lv-nm">직원</div><div class="lv-c">지급</div><div class="lv-c">사용</div><div class="lv-c">잔여</div></div>`;
  for (const e of emps) {
    const t = totals[e.id] || { grant: 0, use: 0 };
    const bal = t.grant - t.use;
    const open = state.leaveExpanded.has(String(e.id));
    html += `<div class="lv-row" data-eid="${e.id}">
      <div class="lv-nm">${open ? "▾" : "▸"} ${esc(e.name)}</div>
      <div class="lv-c grant">${fmtDays(t.grant)}</div>
      <div class="lv-c use">${fmtDays(t.use)}</div>
      <div class="lv-c bal ${bal < 0 ? "neg" : ""}">${fmtDays(bal)}</div>
    </div>`;
    if (open) {
      const rows = state.ledger.filter(r => String(r.employee_id) === String(e.id));
      html += `<div class="lv-detail">` +
        (rows.length ? rows.map(ledgerLine).join("") : `<div class="lv-empty">내역 없음</div>`) +
        `</div>`;
    }
  }
  document.getElementById("leave-summary").innerHTML = html;
}

/* 입력 시트 */
function openLeaveSheet() {
  const sel = document.getElementById("lv-emp");
  sel.innerHTML = state.employees.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join("");
  setLeaveSeg("grant");
  document.getElementById("lv-cat").selectedIndex = 0;
  document.getElementById("lv-reason").value = "";
  document.getElementById("lv-date").value = dateStr(today.y, today.m, today.d);
  document.getElementById("lv-days").value = "1";
  openSheetEl("leave-sheet");
}
function setLeaveSeg(v) {
  leaveDir = v;
  document.getElementById("lv-grant").classList.toggle("sel", v === "grant");
  document.getElementById("lv-use").classList.toggle("sel", v === "use");
}
async function saveLeave() {
  const eid = document.getElementById("lv-emp").value;
  const cat = document.getElementById("lv-cat").value;
  const reason = document.getElementById("lv-reason").value.trim();
  const date = document.getElementById("lv-date").value;
  const days = parseFloat(document.getElementById("lv-days").value);
  if (!eid) { alert("직원을 선택하세요."); return; }
  if (!date) { alert("일자를 입력하세요."); return; }
  if (!(days > 0)) { alert("일수는 0보다 커야 합니다."); return; }
  const btn = document.getElementById("lv-save");
  btn.disabled = true; btn.textContent = "저장 중…";
  try {
    const { error } = await sb.from("leave_ledger").insert({
      employee_id: eid, direction: leaveDir, category: cat,
      reason: reason || null, date, days,
    });
    if (error) throw error;
    closeSheets();
    await loadLeave();
    state.leaveExpanded.add(String(eid));   // 방금 입력한 사람 펼쳐 확인
    renderLeave();
  } catch (e) {
    alert("저장 실패: " + (e.message || e));
  } finally {
    btn.disabled = false; btn.textContent = "저장";
  }
}
async function deleteLeave(id) {
  if (!confirm("이 기록을 삭제할까요?")) return;
  try {
    const { error } = await sb.from("leave_ledger").delete().eq("id", id);
    if (error) throw error;
    await loadLeave();
    renderLeave();
  } catch (e) { alert("삭제 실패: " + (e.message || e)); }
}

/* ── 이벤트 ── */
document.getElementById("prev").onclick = () => step(-1);
document.getElementById("next").onclick = () => step(1);
document.getElementById("today-btn").onclick = () => goMonth(today.y, today.m);
backdrop().onclick = closeSheets;
document.getElementById("view-close").onclick = closeSheets;
document.getElementById("edit-cancel").onclick = closeSheets;
document.getElementById("edit-save").onclick = saveEdit;
document.getElementById("seg-work").onclick = () => setSeg("work");
document.getElementById("seg-off").onclick = () => setSeg("off");
document.getElementById("login-cancel").onclick = closeSheets;
document.getElementById("login-do").onclick = doLogin;

// 직원 관리 모달
document.getElementById("emp-btn").onclick = openEmpModal;
document.getElementById("emp-close").onclick = () => document.getElementById("emp-modal").classList.remove("open");
document.getElementById("emp-done").onclick = () => document.getElementById("emp-modal").classList.remove("open");
document.getElementById("emp-add").onclick = empAdd;
document.getElementById("emp-list").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-act]");
  if (!b) return;
  const { act, id } = b.dataset;
  if (act === "up") empMove(id, "up");
  else if (act === "down") empMove(id, "down");
  else if (act === "toggle") empToggle(id);
});
document.getElementById("emp-list").addEventListener("change", (e) => {
  const inp = e.target.closest("input.emp-name");
  if (inp) empRename(inp.dataset.id, inp.value);
});

// 패턴 편집 모달
document.getElementById("pat-btn").onclick = openPatModal;
document.getElementById("pat-close").onclick = () => document.getElementById("pat-modal").classList.remove("open");
document.getElementById("pat-cancel").onclick = () => document.getElementById("pat-modal").classList.remove("open");
document.getElementById("pat-copy").onclick = patCopyPrev;
document.getElementById("pat-save").onclick = savePat;

// 탭 전환
document.getElementById("tab-sched").onclick = () => setTab("schedule");
document.getElementById("tab-leave").onclick = () => setTab("leave");

// 대체휴무
document.getElementById("leave-add-btn").onclick = openLeaveSheet;
document.getElementById("lv-grant").onclick = () => setLeaveSeg("grant");
document.getElementById("lv-use").onclick = () => setLeaveSeg("use");
document.getElementById("lv-cancel").onclick = closeSheets;
document.getElementById("lv-save").onclick = saveLeave;
document.getElementById("leave-summary").addEventListener("click", (e) => {
  const del = e.target.closest(".lv-del");
  if (del) { deleteLeave(del.dataset.id); return; }
  const row = e.target.closest(".lv-row");
  if (!row) return;
  const eid = row.dataset.eid;
  if (state.leaveExpanded.has(eid)) state.leaveExpanded.delete(eid);
  else state.leaveExpanded.add(eid);
  renderLeave();
});

document.getElementById("grid").addEventListener("click", (e) => {
  if (_dragConsumed) { _dragConsumed = false; return; }   // 드래그 다중선택이면 시트 안 엶
  const td = e.target.closest("td.cell");
  if (!td) return;
  if (state.isAdmin) {
    openEditSheet(td.dataset.eid, td.dataset.date, td.dataset.name);
  } else if (td.dataset.memo) {
    openViewSheet(td.dataset.name, td.dataset.date, td.dataset.memo);
  }
});

// 드래그 다중 선택 (관리자·마우스만; 터치/단일탭은 click으로 기존 시트)
const _gridEl = document.getElementById("grid");
_gridEl.addEventListener("pointerdown", (e) => {
  if (e.pointerType !== "mouse" || !state.isAdmin) return;
  const td = e.target.closest("td.cell");
  if (!td) return;
  hideBulk();
  _drag = true; _dragConsumed = false; _selDates = [];
  _dragEid = td.dataset.eid; _dragStartDay = dayOf(td.dataset.date);
  e.preventDefault();   // 시작 셀은 아직 칠하지 않음(이동해야 선택) → 단일클릭 깜빡임 방지
});
_gridEl.addEventListener("pointermove", (e) => {
  if (!_drag) return;
  const td = e.target.closest(`td.cell[data-eid="${_dragEid}"]`);
  if (!td) return;
  paintRange(_dragStartDay, dayOf(td.dataset.date));
});
document.addEventListener("pointerup", () => {
  if (!_drag) return;
  _drag = false;
  if (_selDates.length >= 2) { _dragConsumed = true; showBulk(_dragEid, _selDates.slice()); }
  else { clearSelection(); }   // 단일 → click 핸들러가 편집 시트 오픈
});
document.getElementById("bulk-work").onclick = () => bulkApply("work");
document.getElementById("bulk-off").onclick = () => bulkApply("off");
document.getElementById("bulk-cancel").onclick = hideBulk;

/* ── 시작 ── */
(async function init() {
  // PIN 로그인 복원: 유지(localStorage) 또는 이번 세션(sessionStorage)
  state.isAdmin = localStorage.getItem("sched_admin_keep") === "1"
    || sessionStorage.getItem("sched_admin") === "1";
  updateAuthUI();
  await goMonth(state.y, state.m);   // 데이터 로드 + 첫 렌더
})();
</script>
