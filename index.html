<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>선과장 근무 스케줄</title>
<style>
  :root{
    --work:#22c55e; --work-bg:#dcfce7;
    --off:#e5e7eb;  --off-bg:#f3f4f6;
    --unset:#fde68a;
    --exc:#f59e0b;
    --memo:#2563eb;
    --border:#e5e7eb; --line:#eceff2;
    --sat:#2563eb; --sun:#dc2626;
    --ink:#1f2937; --sub:#6b7280;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;
    color:var(--ink); background:#f8fafc; font-size:14px; overflow-x:hidden;
  }

  /* 상단 바 */
  .topbar{
    position:sticky; top:0; z-index:20; background:#fff;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px; padding:10px 12px; flex-wrap:wrap;
  }
  .mnav{display:flex; align-items:center; gap:4px}
  .mnav button{
    width:34px; height:34px; border:1px solid var(--border); background:#fff;
    border-radius:8px; font-size:18px; cursor:pointer; color:var(--ink); line-height:1;
  }
  .mlabel{font-size:16px; font-weight:700; min-width:96px; text-align:center}
  .btn{
    border:1px solid var(--border); background:#fff; color:var(--ink);
    padding:7px 12px; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit;
  }
  .btn.pri{background:#1e293b; color:#fff; border-color:#1e293b}
  .spacer{flex:1}
  .role{font-size:12px; color:var(--sub); white-space:nowrap}

  /* 범례 */
  .legend{
    display:flex; flex-wrap:wrap; gap:10px 14px; padding:8px 12px;
    background:#fff; border-bottom:1px solid var(--border); font-size:11px; color:var(--sub);
  }
  .legend span{display:inline-flex; align-items:center; gap:4px}
  .sw{width:14px; height:14px; border-radius:3px; display:inline-block; border:1px solid rgba(0,0,0,.08)}
  .sw.work{background:var(--work)}
  .sw.off{background:var(--off)}
  .sw.unset{background:var(--unset)}
  .sw.exc{background:#fff; outline:2px solid var(--exc); outline-offset:-2px}
  .sw.memo{background:#fff; position:relative}
  .sw.memo::after{content:""; position:absolute; right:1px; bottom:1px; width:5px; height:5px; border-radius:50%; background:var(--memo)}

  /* 그리드 */
  .scroll{overflow:auto; -webkit-overflow-scrolling:touch; max-height:calc(100vh - 150px)}
  table{border-collapse:separate; border-spacing:0; width:max-content}
  th,td{border-right:1px solid var(--line); border-bottom:1px solid var(--line)}

  /* 헤더(요일) */
  thead th{
    position:sticky; top:0; z-index:6; background:#f1f5f9;
    min-width:30px; width:30px; padding:3px 0; text-align:center; font-weight:600;
  }
  thead th.dnum-wrap .dnum{font-size:12px; line-height:1.1}
  thead th .dnum{font-size:12px; line-height:1.15; color:var(--ink)}
  thead th .dwd{font-size:10px; line-height:1.1; color:var(--sub)}
  thead th.sat .dwd{color:var(--sat)} thead th.sat .dnum{color:var(--sat)}
  thead th.sun .dwd{color:var(--sun)} thead th.sun .dnum{color:var(--sun)}
  thead th.today{background:#fff7ed; box-shadow:inset 0 -2px 0 #fb923c}

  /* 이름 열(좌측 고정) */
  th.corner{
    position:sticky; left:0; top:0; z-index:8; background:#eef2f7;
    min-width:64px; width:64px; text-align:center; font-size:12px; color:var(--sub);
  }
  td.name{
    position:sticky; left:0; z-index:5; background:#fff;
    min-width:64px; width:64px; padding:0 8px; font-size:12px; font-weight:600;
    white-space:nowrap; height:30px;
  }

  /* 데이터 셀 */
  td.cell{
    width:30px; min-width:30px; height:30px; padding:0; text-align:center; position:relative;
    background:#fff;
  }
  td.cell.work{background:var(--work)}
  td.cell.off{background:var(--off-bg)}
  td.cell.unset{background:var(--unset)}
  td.cell.exc{outline:2px solid var(--exc); outline-offset:-2px}
  td.cell.tcol{box-shadow:inset 2px 0 0 #fb923c, inset -2px 0 0 #fb923c}
  td.cell .memo{position:absolute; right:2px; bottom:2px; width:6px; height:6px; border-radius:50%; background:var(--memo)}

  /* 집계(하단 고정) */
  tfoot td{
    position:sticky; bottom:0; z-index:6; background:#f8fafc; text-align:center;
    font-size:12px; font-weight:700; height:26px; color:var(--ink);
  }
  tfoot td.name{z-index:9; background:#eef2f7; color:var(--sub); font-weight:600}
  tfoot tr.off-row td{color:var(--sub); font-weight:600}
  tfoot td.tcol{background:#fff7ed}

  /* 메모 팝업 */
  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; z-index:40}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41; background:#fff;
    border-radius:16px 16px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .2s; max-width:560px; margin:0 auto;
  }
  .sheet.open{transform:translateY(0)}
  .sheet h3{margin:0 0 8px; font-size:15px}
  .sheet .memo-date{font-size:12px; color:var(--sub); margin-bottom:6px}
  .sheet .memo-text{font-size:14px; line-height:1.5; white-space:pre-wrap; word-break:break-word}
  .sheet .close{margin-top:14px; width:100%; padding:11px; border:0; border-radius:10px; background:#1e293b; color:#fff; font-size:14px; cursor:pointer}

  .msg{padding:24px 16px; text-align:center; color:var(--sub); font-size:13px}
  .err{color:#dc2626}
</style>
</head>
<body>

<div class="topbar">
  <div class="mnav">
    <button id="prev" aria-label="이전 달">‹</button>
    <div class="mlabel" id="mlabel">—</div>
    <button id="next" aria-label="다음 달">›</button>
  </div>
  <button class="btn" id="today-btn">오늘</button>
  <div class="spacer"></div>
  <span class="role" id="role">읽기 전용</span>
  <button class="btn" id="admin-btn">관리자</button>
</div>

<div class="legend">
  <span><i class="sw work"></i>근무</span>
  <span><i class="sw off"></i>휴무</span>
  <span><i class="sw unset"></i>패턴 미설정</span>
  <span><i class="sw exc"></i>예외</span>
  <span><i class="sw memo"></i>메모</span>
</div>

<div class="scroll" id="scroll">
  <div class="msg" id="grid-msg">불러오는 중…</div>
  <div id="grid"></div>
</div>

<!-- 메모 팝업 -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet">
  <h3 id="sheet-title">메모</h3>
  <div class="memo-date" id="sheet-date"></div>
  <div class="memo-text" id="sheet-text"></div>
  <button class="close" id="sheet-close">닫기</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

/* ── Supabase ── */
const SUPABASE_URL = "https://nwokdlcdiphltgmtysim.supabase.co";
const SUPABASE_KEY = "sb_publishable_erFCG-fmkg6t0k3GB6M0nA_0djQcjC5";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── 날짜 헬퍼 (전부 로컬 기준 — UTC 밀림 방지) ── */
const WD = ["일","월","화","수","목","금","토"];
const pad2 = n => String(n).padStart(2, "0");
const ymStr = (y,m) => `${y}-${pad2(m)}`;
const dateStr = (y,m,d) => `${y}-${pad2(m)}-${pad2(d)}`;
const daysInMonth = (y,m) => new Date(y, m, 0).getDate();      // m=1..12
const weekday = (y,m,d) => new Date(y, m-1, d).getDay();       // 0=일 ~ 6=토

const _now = new Date();
const today = { y:_now.getFullYear(), m:_now.getMonth()+1, d:_now.getDate() };

/* ── 상태 ── */
const state = {
  y: today.y, m: today.m,
  employees: [],
  patterns: {},   // employee_id -> pattern row
  overrides: {},  // "employee_id|YYYY-MM-DD" -> override row
};

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ── 데이터 로드 ── */
async function loadMonth(y, m) {
  const ym = ymStr(y,m);
  const first = dateStr(y,m,1);
  const last  = dateStr(y,m,daysInMonth(y,m));
  const [emp, pat, ovr] = await Promise.all([
    sb.from("employees").select("*").eq("active", true).order("display_order"),
    sb.from("monthly_patterns").select("*").eq("month", ym),
    sb.from("schedule_overrides").select("*").gte("date", first).lte("date", last),
  ]);
  if (emp.error) throw emp.error;
  if (pat.error) throw pat.error;
  if (ovr.error) throw ovr.error;

  state.employees = emp.data || [];
  state.patterns = {};
  (pat.data || []).forEach(p => { state.patterns[p.employee_id] = p; });
  state.overrides = {};
  (ovr.data || []).forEach(o => { state.overrides[o.employee_id + "|" + o.date] = o; });
}

/* ── 셀 상태 계산 ──
   1) override 있으면 그 status가 최종
   2) 없으면 그 달 패턴 off_weekdays 포함 시 휴무, 아니면 근무
   3) 패턴 행 없으면 '미설정' = 근무로 간주 */
function cellStatus(emp, y, m, d) {
  const ds = dateStr(y,m,d);
  const pat = state.patterns[emp.id];
  const patternSet = !!pat;
  const patternStatus = patternSet
    ? (pat.off_weekdays.includes(weekday(y,m,d)) ? "off" : "work")
    : "work";
  const ov = state.overrides[emp.id + "|" + ds];
  if (ov) {
    return { status: ov.status, isException: ov.status !== patternStatus, memo: ov.memo || "", patternSet };
  }
  return { status: patternStatus, isException: false, memo: "", patternSet };
}

const isToday = (y,m,d) => y===today.y && m===today.m && d===today.d;

/* ── 렌더 ── */
function render() {
  const y = state.y, m = state.m, dim = daysInMonth(y,m);
  document.getElementById("mlabel").textContent = `${y}년 ${m}월`;

  if (!state.employees.length) {
    document.getElementById("grid").innerHTML = "";
    const msg = document.getElementById("grid-msg");
    msg.textContent = "재직 중인 직원이 없습니다.";
    msg.style.display = "";
    return;
  }
  document.getElementById("grid-msg").style.display = "none";

  // 헤더
  let thead = `<tr><th class="corner">직원</th>`;
  for (let d=1; d<=dim; d++){
    const wd = weekday(y,m,d);
    const cls = (wd===0?"sun":wd===6?"sat":"") + (isToday(y,m,d)?" today":"");
    thead += `<th class="${cls}"><div class="dnum">${d}</div><div class="dwd">${WD[wd]}</div></th>`;
  }
  thead += `</tr>`;

  // 본문
  let tbody = "";
  for (const emp of state.employees){
    let row = `<tr><td class="name">${esc(emp.name)}</td>`;
    for (let d=1; d<=dim; d++){
      const cs = cellStatus(emp,y,m,d);
      let cls = "cell " + (cs.status==="off" ? "off" : (cs.patternSet ? "work" : "unset"));
      if (cs.isException) cls += " exc";
      if (isToday(y,m,d)) cls += " tcol";
      const memoAttr = cs.memo
        ? ` data-memo="${esc(cs.memo)}" data-name="${esc(emp.name)}" data-date="${dateStr(y,m,d)}"` : "";
      const dot = cs.memo ? `<span class="memo"></span>` : "";
      row += `<td class="${cls}"${memoAttr}>${dot}</td>`;
    }
    tbody += row + `</tr>`;
  }

  // 집계 (근무/휴무) — 미설정도 근무로 카운트되어 근무+휴무 = 재직 인원
  let workRow = `<tr class="work-row"><td class="name">근무</td>`;
  let offRow  = `<tr class="off-row"><td class="name">휴무</td>`;
  for (let d=1; d<=dim; d++){
    let w=0, o=0;
    for (const emp of state.employees){
      (cellStatus(emp,y,m,d).status==="off") ? o++ : w++;
    }
    const t = isToday(y,m,d) ? " tcol" : "";
    workRow += `<td class="${t}">${w}</td>`;
    offRow  += `<td class="${t}">${o}</td>`;
  }
  workRow += `</tr>`; offRow += `</tr>`;

  document.getElementById("grid").innerHTML =
    `<table><thead>${thead}</thead><tbody>${tbody}</tbody><tfoot>${workRow}${offRow}</tfoot></table>`;
}

/* ── 월 이동 ── */
async function goMonth(y, m) {
  state.y = y; state.m = m;
  const msg = document.getElementById("grid-msg");
  msg.textContent = "불러오는 중…"; msg.className = "msg"; msg.style.display = "";
  document.getElementById("grid").innerHTML = "";
  try {
    await loadMonth(y, m);
    render();
  } catch (e) {
    document.getElementById("grid").innerHTML = "";
    msg.className = "msg err";
    msg.textContent = "불러오기 실패: " + (e.message || e);
    msg.style.display = "";
    console.error(e);
  }
}
function step(delta) {
  let y = state.y, m = state.m + delta;
  if (m < 1) { m = 12; y--; } else if (m > 12) { m = 1; y++; }
  goMonth(y, m);
}

/* ── 메모 팝업 ── */
function openSheet(name, date, memo) {
  document.getElementById("sheet-title").textContent = name + " 메모";
  document.getElementById("sheet-date").textContent = date;
  document.getElementById("sheet-text").textContent = memo;
  document.getElementById("sheet-bg").style.display = "block";
  requestAnimationFrame(() => document.getElementById("sheet").classList.add("open"));
}
function closeSheet() {
  document.getElementById("sheet").classList.remove("open");
  setTimeout(() => { document.getElementById("sheet-bg").style.display = "none"; }, 180);
}

/* ── 이벤트 ── */
document.getElementById("prev").onclick = () => step(-1);
document.getElementById("next").onclick = () => step(1);
document.getElementById("today-btn").onclick = () => goMonth(today.y, today.m);
document.getElementById("admin-btn").onclick = () =>
  alert("관리자 로그인은 다음 단계(3단계)에서 활성화됩니다.");
document.getElementById("sheet-bg").onclick = closeSheet;
document.getElementById("sheet-close").onclick = closeSheet;
document.getElementById("grid").addEventListener("click", (e) => {
  const td = e.target.closest("td[data-memo]");
  if (!td) return;
  openSheet(td.dataset.name, td.dataset.date, td.dataset.memo);
});

/* ── 시작 ── */
goMonth(state.y, state.m);
</script>
</body>
</html>
